services:
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    init: true
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./backend/youtube_cookies.txt:/app/youtube_cookies.txt
    env_file:
      - ./backend/.env
    environment:
      - SHADOWLEARN_YTDLP_COOKIES_FILE=/app/youtube_cookies.txt
      - SHADOWLEARN_YTDLP_BGUTIL_URL=http://bgutil-provider:4416
      # Single-host dev: proxy talks to the sibling container.
      # Production: override with offshore https hostname in env.
      # SHADOWLEARN_OFFSHORE_INTERNAL_TOKEN must be set in backend/.env
      # and match INTERNAL_TOKEN in backend/livekit_agent/.env.
      - SHADOWLEARN_OFFSHORE_BASE_URL=http://livekit-agent:8082
    depends_on:
      bgutil-provider:
        condition: service_started
      livekit-agent:
        condition: service_healthy

  livekit-agent:
    build:
      context: ./backend
      dockerfile: livekit_agent/Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
      - "127.0.0.1:8082:8082"
    env_file:
      - ./backend/livekit_agent/.env
    environment:
      - LIVEKIT_URL=wss://ross-geller-slpy62sv.livekit.cloud
      - HTTP_PORT=8082
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

