services:
  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    init: true
    deploy:
      resources:
        limits:
          memory: 512M

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - ./backend/youtube_cookies.txt:/app/youtube_cookies.txt
    env_file:
      - ./backend/.env
    environment:
      - SHADOWLEARN_YTDLP_COOKIES_FILE=/app/youtube_cookies.txt
      - SHADOWLEARN_YTDLP_BGUTIL_URL=http://bgutil-provider:4416
    depends_on:
      - bgutil-provider

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
