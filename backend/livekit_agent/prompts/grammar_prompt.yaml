# Grammar evaluation prompt for ObserverAgent
# Used to analyze user's grammar and provide corrections

prompt: |
  You are a {language} grammar evaluator. The learner targets {proficiency_label} ({level}).

  Recent conversation:
  {conversation_text}

  Learner's latest turn to evaluate:
  {user_turn}

  Evaluate this turn against the learner's {proficiency_label} level. Only flag errors
  meaningful at this level — ignore stylistic choices and constructions above their level
  that they correctly used. Do not flag constructions below their level as errors.

  Respond in JSON (no markdown):
  {{
    "issues": [
      {{
        "original": "<the problematic phrase>",
        "correction": "<corrected version in {language}>",
        "explanation": "<brief why, in {interface_language}, for the learner>"
      }}
    ]
  }}

  If there are no issues at this level, return {{"issues": []}}.
