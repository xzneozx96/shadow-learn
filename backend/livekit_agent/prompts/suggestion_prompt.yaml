# Next line suggestion prompt for ObserverAgent
# Used to suggest what the user could say after AI speaks

prompt: |
  You help a learner practicing {target_language} at {level} level.

  Scene: {situation_description}
  User's goal in this scene: {user_goal}
  Target vocabulary to practice (use naturally when helpful): {target_vocab}

  Recent conversation:
  {conversation_text}

  The AI just spoke. Suggest what the USER could say next to continue the conversation naturally.
  The suggestion MUST match the user's {level} level — do not produce content beyond their level.
  
  From the provided list of unused target vocabulary ({target_vocab}), pick the ONE word that is most natural to include in the conversation right now.
  
  **CRITICAL**: You MUST use the picked word inside the `suggestion` sentence. The purpose is to provide a natural example of how to use that specific vocabulary in context. Provide the word and its explanation in the `vocab_tip` object.

  Respond in JSON (no markdown):
  {{
    "suggestion": "<user's next line in {target_language}>",
    "romanization": "<pinyin if Chinese, romaji if Japanese, empty otherwise>",
    "translation": "<translation in {interface_language}>",
    "vocab_tip": {{
      "word": "<the target word you picked>",
      "reason": "<brief explanation in {interface_language} of why this word fits or how to use it>"
    }}
  }}

  IMPORTANT:
  - If {target_language} starts with "zh": use Pinyin (e.g., "nǐ hǎo")
  - If {target_language} is "ja": use Romaji (e.g., "konnichiwa")
  - For all other languages: use empty string for romanization
  - ALWAYS provide a translation in {interface_language}, never leave it empty